# =============================================================================
# Track Navigation: one-shot conservative fine-tuning from a trained Standard model
# 目标：不破坏已训练好的运动能力，用 goal/nav command injection 立刻开始 Track 训练。
# =============================================================================

[env]
num_envs = 4096
episode_length_s = 40

[env_conf]
seed = 0

[terrain]
mode = "track"
num_rows = 10
num_cols = 10
difficulty_range = [0.0, 1.0]
curriculum = true
max_init_terrain_level = 9

[terrain.track]
track_length = 5
sub_terrains = ["pyramid_slope", "pyramid_slope_inv", "pyramid_stairs", "pyramid_stairs_inv", "open_entry_maze"]

[domain_rand]
enable_domain_rand = true
randomize_friction = true
friction_range = [0.8, 1.2]
push_robots = false
push_interval_s = 15
max_push_vel_xy = 0.2

[noise]
add_noise = false

[init_state]
pos = [0.0, 0.0, 0.35]

[commands]
# command_manager 会被 nav_command.py 改写为 goal-directed command；
# 这里保留前进型范围，避免初始化/回退时给随机大转向。
resampling_time = [5.0, 5.0]

[commands.limit]
lin_vel_x = [0.0, 0.8]
lin_vel_y = [-0.3, 0.3]
ang_vel_z = [-1.5, 1.5]

[commands.ranges]
lin_vel_x = [0.30, 0.75]
lin_vel_y = [-0.1, 0.1]
ang_vel_yaw = [-0.1, 0.1]

# =============================================================================
# Reward Configuration: keep locomotion stable, make navigation dense but not reckless
# =============================================================================

[rewards.track_lin_vel_xy]
weight = 1.0
[rewards.track_lin_vel_xy.params]
std = 0.50
command_name = "base_velocity"

[rewards.track_ang_vel_z]
weight = 0.8
[rewards.track_ang_vel_z.params]
std = 0.35
command_name = "base_velocity"

[rewards.lin_vel_z]
weight = -2.0

[rewards.ang_vel_xy]
weight = -0.08

[rewards.joint_acc]
weight = -2.5e-7

[rewards.joint_torques]
weight = -1.0e-4

[rewards.dof_pos_limits]
weight = -3.0

[rewards.action_rate]
weight = -0.03

[rewards.action_smoothness]
weight = -0.01

[rewards.undesired_contacts]
weight = -1.3
[rewards.undesired_contacts.params]
threshold = 1

[rewards.flat_orientation]
weight = -1.5

[rewards.feet_air_time]
weight = 0.2
[rewards.feet_air_time.params]
command_name = "base_velocity"
threshold = 0.35

[rewards.stand_still]
weight = -1.0
[rewards.stand_still.params]
command_name = "base_velocity"
scale = 5.0

# Track-specific rewards.  navigation_time 不能太大，否则会冲墙/冲楼梯。
[rewards.reach_goal]
weight = 20.0
[rewards.reach_goal.params]
threshold = 0.6

[rewards.approach_goal]
weight = 2.0

[rewards.goal_direction]
weight = 1.0
[rewards.goal_direction.params]
command_name = "base_velocity"


[rewards.navigation_time]
weight = -0.02
