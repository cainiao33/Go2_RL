# =============================================================================
# Standard Locomotion: locomotion training on a standard grid of mixed sub-terrains.
# Standard Locomotion: 标准地形运动训练（多种子地形按比例混合）
#
# Based on  Stage1 + extra terms (termination / flat_orientation / feet_stumble).
# 基于 Stage1 + 额外项（termination / flat_orientation / feet_stumble）
# =============================================================================

# === Basic Configuration ===
# === 基础配置 ===
[env]
# Number of parallel environments, valid range: [1, 4096].
# 并行环境数量，合法范围：[1, 4096]
num_envs = 4096

# Max episode duration (seconds).
# 最大 episode 时长（秒）
episode_length_s = 20

[env_conf]
# Random seed.
# 随机种子
seed = 0


# === Terrain Configuration ===
# === 地形配置 ===
[terrain]
# Terrain mode, valid values: "standard" | "track".
# 地形模式，合法值："standard" | "track"
mode = "standard"

# In standard mode, num_rows = number of difficulty tiers (curriculum levels along X),
# valid range [1, 10], recommended 10.
# standard 模式下 num_rows 表示**难度级别数**（沿 X 轴的课程档位），合法范围：[1, 10]，推荐 10
num_rows = 10

# In standard mode, num_cols = parallel plots within the same difficulty tier along Y,
# valid range [1, 40], recommended 20.
# Note: in standard mode num_cols is NOT a difficulty tier, just parallel plots for env distribution.
# standard 模式下 num_cols 表示**同一难度下的并行地块数**（沿 Y 轴），合法范围：[1, 40]，推荐 20
# 注意：standard 模式下 num_cols 不是难度档，而是用于分散大量 env 到不同地块的并行数
num_cols = 20

# Difficulty range [min, max], valid range: [0.0, 1.0].
# 难度范围 [min, max]，合法范围：[0.0, 1.0]
difficulty_range = [0.0, 1.0]

# Whether to enable terrain curriculum (promote/demote difficulty by performance).
# 是否启用地形课程学习（按表现晋级/降级难度）
curriculum = true

# Max init difficulty tier for robot placement, valid range: [0, 9].
# 机器人初始放置的最大难度档，合法范围：[0, 9]
max_init_terrain_level = 5


# Sub-terrain proportions (all proportions must sum to 1.0).
# Allowed sub-terrains: pyramid_slope | pyramid_slope_inv | pyramid_stairs | pyramid_stairs_inv | maze
# 子地形比例（所有 proportion 之和必须 = 1.0）
# 合法子地形：pyramid_slope | pyramid_slope_inv | pyramid_stairs | pyramid_stairs_inv | maze
[terrain.standard.pyramid_slope]
proportion = 0.12

[terrain.standard.pyramid_slope_inv]
proportion = 0.18

[terrain.standard.pyramid_stairs]
proportion = 0.22

[terrain.standard.pyramid_stairs_inv]
proportion = 0.38

[terrain.standard.maze]
proportion = 0.1


# === Domain Randomization ===
# === 域随机化 ===
[domain_rand]
# Master switch for domain randomization.
# 域随机化总开关
enable_domain_rand = true

# Whether to randomize ground friction.
# 是否随机化地面摩擦系数
randomize_friction = true

# Friction range [min, max], must be >= 0.
# 摩擦系数采样范围 [min, max]，必须 >= 0
# 默认摩擦范围
friction_range = [0.3, 1.5]

# Whether to periodically push the robot.
# 是否周期性对机器人施加外部推力
push_robots = true

# Push interval (seconds), must be > 0.
# 推力间隔（秒），必须 > 0
# 默认推力间隔
push_interval_s = 15

# Max push velocity in XY plane (m/s), must be >= 0.
# XY 平面最大推力速度 (m/s)，必须 >= 0
# 默认推力强度
max_push_vel_xy = 0.5


# === Observation Noise ===
# === 观测噪声 ===
[noise]
# Whether to add noise to observations.
# 是否在观测中加入噪声
add_noise = true


# === Initial State ===
# === 初始状态 ===
[init_state]
# Robot initial position [x, y, z] (m); z valid range [0.30, 0.60]m, recommended 0.35m.
# 机器人初始位置 [x, y, z] (m)；z 合法范围：[0.30, 0.60]m，推荐 0.35m
pos = [0.0, 0.0, 0.35]


# === Velocity Commands ===
# === 速度命令 ===
[commands]
# Velocity command resampling interval [min, max] (seconds).
# 速度命令重采样区间 [min, max]（秒）
resampling_time = [10.0, 10.0]

[commands.limit]
# Velocity command **hard limits** (curriculum may expand sampling range up to here).
# 速度命令 **采样上限**（硬约束，curriculum 最多扩展到该范围）
lin_vel_x = [-1.0, 2.0]
lin_vel_y = [-1.0, 1.0]
ang_vel_z = [-1.5, 1.5]

[commands.ranges]
# Velocity command **initial sampling ranges** (expand towards limit when curriculum is enabled).
# 速度命令 **初始采样范围**（curriculum 开启时会动态扩大到 limit）

# Start with forward-only to prevent reversing that triggers stair-curriculum demotions;
# curriculum will expand towards limit.
# 初始以前进为主，适当扩大范围以加速学习
lin_vel_x = [0.0, 0.8]
lin_vel_y = [-0.3, 0.3]
ang_vel_yaw = [-0.5, 0.5]


# =====================================================================
# Reward Configuration（对齐评测环境）
# 奖励配置（对齐评测环境 eval_env_conf.toml 的 16 项 reward）
#
# Each reward term must have a numeric `weight`; parameterized rewards use [rewards.<name>.params].
# 每个奖励项必须包含数值型 weight；带参数的奖励用 [rewards.<name>.params] 配置
# =====================================================================

# --- Positive: velocity tracking ---
# 训练阶段适当提高前进权重，打破"站着不动"的局部最优
# 评测时权重是 1.5/0.75，训练时用 2.5/1.0 给更多前进动力
[rewards.track_lin_vel_xy]
weight = 2.5
[rewards.track_lin_vel_xy.params]
std = 0.25
command_name = "base_velocity"

[rewards.track_ang_vel_z]
weight = 1.0
[rewards.track_ang_vel_z.params]
std = 0.25
command_name = "base_velocity"

# --- Negative: base velocity ---
# 训练阶段关闭 base_linear_velocity 惩罚
# 这个惩罚直接打击 XY 速度，与 track_lin_vel_xy 矛突
# 评测权重 -2.0 会在评测环境自动生效，训练时不设
[rewards.base_linear_velocity]
weight = 0.0

[rewards.base_angular_velocity]
# 基座 roll/pitch 角速度惩罚
weight = -0.05

# --- Negative: joint smoothness (对齐评测) ---
[rewards.joint_acc]
weight = -2.5e-7

[rewards.joint_vel]
# 关节速度惩罚
weight = -0.001

[rewards.joint_torques]
weight = -0.0002

[rewards.dof_pos_limits]
# 训练阶段降低关节极限惩罚（评测 -10.0 太强，抑制运动）
weight = -5.0

[rewards.energy]
# 能耗惩罚：扭矩 × 关节速度
weight = -2e-05

# --- Negative: action smoothness (对齐评测) ---
[rewards.action_rate]
weight = -0.1

# --- Negative: undesired contacts (对齐评测) ---
[rewards.undesired_contacts]
weight = -1.0
[rewards.undesired_contacts.params]
threshold = 1

# --- Negative: orientation (对齐评测 flat_orientation_l2) ---
[rewards.flat_orientation_l2]
# 已禁用：由 adaptive_orientation 替代，实现地形自适应姿态惩罚
weight = 0.0

# --- Negative: joint position (对齐评测) ---
[rewards.joint_pos]
# 关节位置偏离默认姿态惩罚
weight = -0.7

# --- Negative: gait symmetry (对齐评测) ---
[rewards.air_time_variance]
# 步态对称性惩罚
weight = -1.0

# --- Negative: foot sliding (对齐评测) ---
[rewards.feet_slide]
# 脚部滑动惩罚
weight = -0.1

# --- Positive: feet air time ---
# 训练阶段提高抬脚奖励，鼓励实际迈步（评测 0.1，训练 0.3）
[rewards.feet_air_time]
weight = 0.3
[rewards.feet_air_time.params]
command_name = "base_velocity"
threshold = 0.5

# --- Positive: stairs descend progress ---
# 下楼梯前进奖励：在下坡/下楼梯时奖励正向速度
# V9 使用 1.5，V10 尝试提高到 2.0 看能否提升下楼梯
[rewards.stairs_descend_progress]
weight = 2.0

# --- Negative: action smoothnes ---
# 二阶 jerk 惩罚：a_t - 2*a_{t-1} + a_{t-2}
# V6 发现 -0.02 对下楼梯约束过大，V7 降低到 -0.01
[rewards.action_smoothness]
weight = -0.01

# --- Negative: stand still ---
# 零命令时惩罚关节偏离默认姿态
[rewards.stand_still]
weight = -0.5
[rewards.stand_still.params]
command_name = "base_velocity"
scale = 5.0

# --- Adaptive orientation penalty ---
# 自适应姿态惩罚：根据坡度动态调整惩罚强度
# 平地惩罚最重（保持水平），坡度越大惩罚越轻（允许倾斜）
# 替代固定的 flat_orientation_l2，实现地形自适应
[rewards.adaptive_orientation]
weight = -1.0

# --- Track only: reach goal (仅 track 模式使用) ---
[rewards.reach_goal]
weight = 10.0
[rewards.reach_goal.params]
threshold = 0.6
